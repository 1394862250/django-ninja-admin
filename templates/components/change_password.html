<!-- 修改密码模态框组件 -->
<div id="change-password-modal" class="fixed inset-0 bg-gray-900/60 dark:bg-black/70 flex items-center justify-center hidden z-50">
    <div class="bg-white dark:bg-gray-900 rounded shadow-lg max-w-md w-full mx-4 border border-gray-200 dark:border-gray-800">
        <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-800">
            <h3 class="text-lg font-medium text-gray-900 dark:text-white">修改密码</h3>
            <button class="change-password-close-modal text-gray-400 hover:text-gray-500 dark:hover:text-gray-300">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <form id="change-password-form" class="p-4">
            {% csrf_token %}
            <div class="space-y-4">
                <div>
                    <label for="old_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">当前密码</label>
                    <input type="password" id="old_password" name="old_password" required
                           class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-blue-500 focus:ring-blue-500 px-3 py-2">
                </div>
                <div>
                    <label for="new_password1" class="block text-sm font-medium text-gray-700 dark:text-gray-300">新密码</label>
                    <input type="password" id="new_password1" name="new_password1" required
                           class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-blue-500 focus:ring-blue-500 px-3 py-2">
                    <p class="mt-1 text-xs text-gray-500 dark:text-gray-400">密码长度不能少于8个字符</p>
                </div>
                <div>
                    <label for="new_password2" class="block text-sm font-medium text-gray-700 dark:text-gray-300">确认新密码</label>
                    <input type="password" id="new_password2" name="new_password2" required
                           class="mt-1 block w-full rounded-md border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white shadow-sm focus:border-blue-500 focus:ring-blue-500 px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        <i class="fas fa-shield-alt mr-2 text-gray-400"></i>验证码
                    </label>
                    <div class="flex items-center space-x-3">
                        <input 
                            type="text" 
                            id="change-password-captcha" 
                            name="captcha" 
                            required
                            placeholder="请输入验证码"
                            class="flex-1 px-3 py-2 border border-gray-300 dark:border-gray-600 rounded dark:bg-gray-700 dark:text-white focus:outline-none focus:border-blue-500"
                        >
                        <div class="flex-shrink-0">
                            <img 
                                id="change-password-captcha-image" 
                                src="" 
                                alt="验证码" 
                                class="h-10 w-32 border border-gray-300 dark:border-gray-600 rounded cursor-pointer"
                                onclick="refreshChangePasswordCaptcha()"
                                title="点击刷新验证码"
                            >
                        </div>
                        <button 
                            type="button" 
                            onclick="refreshChangePasswordCaptcha()"
                            class="flex-shrink-0 px-3 py-2 text-gray-600 dark:text-gray-400"
                            title="刷新验证码"
                        >
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                    <input type="hidden" id="change-password-captcha-key" name="captcha_key">
                </div>
            </div>
            
            <div class="mt-6 flex justify-end space-x-3">
                <button type="button" class="change-password-close-btn px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded focus:outline-none dark:bg-gray-700 dark:text-gray-200 dark:border-gray-600">
                    取消
                </button>
                <button type="submit" class="px-4 py-2 text-sm font-medium text-white bg-orange-500 dark:bg-gray-700 rounded focus:outline-none">
                    修改密码
                </button>
            </div>
        </form>
    </div>
</div>

<script>
(function() {
    const modal = document.getElementById('change-password-modal');
    const form = document.getElementById('change-password-form');
    const closeBtns = modal.querySelectorAll('.change-password-close-modal, .change-password-close-btn');
    
    // 显示/隐藏模态框
    function toggleModal(show) {
        if (show) {
            modal.classList.remove('hidden');
            refreshChangePasswordCaptcha(); // 打开时刷新验证码
        } else {
            modal.classList.add('hidden');
            form.reset();
            document.getElementById('change-password-captcha').value = '';
            document.getElementById('change-password-captcha-key').value = '';
        }
    }
    
    // 显示提示消息
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `fixed top-4 right-4 px-4 py-2 rounded text-white text-sm z-50 ${
            type === 'success' ? 'bg-green-500' : 'bg-red-500'
        }`;
        toast.textContent = message;
        
        document.body.appendChild(toast);
        
        setTimeout(() => {
            toast.remove();
        }, 3000);
    }
    
    // 刷新验证码
    window.refreshChangePasswordCaptcha = async function() {
        try {
            const response = await fetch('/api/user/change-password', {
                method: 'GET',
                credentials: 'same-origin'
            });
            
            const data = await response.json();
            
            if (data.success && data.data) {
                const captchaImage = document.getElementById('change-password-captcha-image');
                const captchaKeyInput = document.getElementById('change-password-captcha-key');
                
                if (captchaImage && captchaKeyInput) {
                    captchaImage.src = data.data.captcha_image_url;
                    captchaKeyInput.value = data.data.captcha_key;
                }
            }
        } catch (error) {
            console.error('获取验证码失败:', error);
            showToast('获取验证码失败，请重试', 'error');
        }
    };
    
    // 关闭模态框
    closeBtns.forEach(btn => {
        btn.addEventListener('click', () => toggleModal(false));
    });
    
    // 点击模态框外部关闭
    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            toggleModal(false);
        }
    });
    
    // 表单提交
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const oldPassword = document.getElementById('old_password').value;
        const newPassword1 = document.getElementById('new_password1').value;
        const newPassword2 = document.getElementById('new_password2').value;
        const captcha = document.getElementById('change-password-captcha').value;
        const captchaKey = document.getElementById('change-password-captcha-key').value;
        
        // 验证密码长度
        if (newPassword1.length < 8) {
            showToast('新密码长度不能少于8个字符', 'error');
            return;
        }
        
        // 验证两次密码是否一致
        if (newPassword1 !== newPassword2) {
            showToast('两次输入的新密码不一致', 'error');
            return;
        }
        
        // 验证验证码
        if (!captcha || !captchaKey) {
            showToast('请先获取验证码', 'error');
            refreshChangePasswordCaptcha();
            return;
        }
        
        const formData = {
            old_password: oldPassword,
            new_password1: newPassword1,
            new_password2: newPassword2,
            captcha: captcha,
            captcha_key: captchaKey
        };
        
        const submitBtn = form.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>修改中...';
        
        try {
            // 直接提交修改密码请求，API会验证验证码
            const response = await fetch('/api/user/change-password', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                credentials: 'same-origin',
                body: JSON.stringify(formData)
            });
            
            const data = await response.json();
            
            if (data.success) {
                showToast(data.message || '密码修改成功');
                toggleModal(false);
                // 密码修改成功后延迟跳转到登录页
                setTimeout(() => {
                    window.location.href = '{% url "web:login" %}';
                }, 1500);
            } else {
                showToast(data.message || '密码修改失败', 'error');
                refreshChangePasswordCaptcha(); // 失败后刷新验证码
            }
        } catch (error) {
            console.error('密码修改错误:', error);
            showToast('网络错误，请稍后重试', 'error');
            refreshChangePasswordCaptcha();
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    });
    
    // 获取Cookie的辅助函数
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // 暴露打开模态框的函数到全局作用域
    window.openChangePasswordModal = function() {
        toggleModal(true);
    };
    
    // 页面加载时初始化（如果模态框已存在）
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            // 确保模态框初始状态是隐藏的
            if (modal) {
                modal.classList.add('hidden');
            }
        });
    } else {
        if (modal) {
            modal.classList.add('hidden');
        }
    }
})();
</script>
