<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#f43f5e',
                        dark: '#1e293b'
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50 relative overflow-hidden"
      {% if auth_background %}
      style="background-image: url('{{ auth_background }}'); background-size: cover; background-position: center; background-repeat: no-repeat;"
      {% endif %}>
    {% if not auth_background %}
    <!-- 静态线条背景 -->
    <div class="absolute inset-0 z-0 opacity-30">
        <svg class="absolute inset-0 w-full h-full" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#4f46e5" stroke-width="1"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#grid)" />
        </svg>
        <!-- 装饰性线条 -->
        <div class="absolute top-0 left-0 w-full h-full">
            <svg class="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                <line x1="0" y1="20%" x2="100%" y2="20%" stroke="#6366f1" stroke-width="2" stroke-opacity="0.1"/>
                <line x1="0" y1="40%" x2="100%" y2="40%" stroke="#6366f1" stroke-width="2" stroke-opacity="0.1"/>
                <line x1="0" y1="60%" x2="100%" y2="60%" stroke="#6366f1" stroke-width="2" stroke-opacity="0.1"/>
                <line x1="0" y1="80%" x2="100%" y2="80%" stroke="#6366f1" stroke-width="2" stroke-opacity="0.1"/>
                <line x1="20%" y1="0" x2="20%" y2="100%" stroke="#6366f1" stroke-width="2" stroke-opacity="0.1"/>
                <line x1="40%" y1="0" x2="40%" y2="100%" stroke="#6366f1" stroke-width="2" stroke-opacity="0.1"/>
                <line x1="60%" y1="0" x2="60%" y2="100%" stroke="#6366f1" stroke-width="2" stroke-opacity="0.1"/>
                <line x1="80%" y1="0" x2="80%" y2="100%" stroke="#6366f1" stroke-width="2" stroke-opacity="0.1"/>
            </svg>
        </div>
    </div>
    {% endif %}

    <div class="w-full max-w-md mx-auto p-8 bg-white rounded-xl shadow-xl relative z-10 border border-gray-100">
        <div class="text-center mb-8">
            {% include "components/system_title.html" %}
            <h1 class="text-3xl font-bold text-gray-900 mt-4">用户登录</h1>
            <p class="text-sm text-gray-500 mt-2">欢迎回来，请登录您的账户</p>
        </div>

        <!-- 消息提示区域 -->
        <div id="message-container" class="mb-6 hidden">
            <div id="message-content" class="p-4 rounded-lg"></div>
        </div>

        <form id="login-form" class="space-y-5">
            {% csrf_token %}
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-user mr-2 text-gray-400"></i>用户名
                </label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    required
                    autocomplete="username"
                    placeholder="请输入用户名"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition duration-200 outline-none"
                >
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2 text-gray-400"></i>密码
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required
                    autocomplete="current-password"
                    placeholder="请输入密码"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition duration-200 outline-none"
                >
            </div>

            <!-- 验证码区域 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-shield-alt mr-2 text-gray-400"></i>验证码
                </label>
                <div class="flex items-center space-x-3">
                    <input 
                        type="text" 
                        id="captcha" 
                        name="captcha" 
                        required
                        placeholder="请输入验证码"
                        class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition duration-200 outline-none"
                    >
                    <div class="flex-shrink-0">
                        <img 
                            id="captcha-image" 
                            src="" 
                            alt="验证码" 
                            class="h-12 w-32 border border-gray-300 rounded-lg cursor-pointer hover:border-primary transition duration-200"
                            onclick="refreshCaptcha()"
                            title="点击刷新验证码"
                        >
                    </div>
                    <button 
                        type="button" 
                        onclick="refreshCaptcha()"
                        class="flex-shrink-0 px-3 py-3 text-gray-600 hover:text-primary transition duration-200"
                        title="刷新验证码"
                    >
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
                <input type="hidden" id="captcha-key" name="captcha_key">
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center">
                    <input type="checkbox" name="remember" class="rounded border-gray-300 text-primary focus:ring-primary">
                    <span class="ml-2 text-sm text-gray-600">记住我</span>
                </label>
                <a href="#" class="text-sm text-primary hover:text-indigo-600 hover:underline">
                    忘记密码？
                </a>
            </div>

            <button 
                type="submit" 
                id="login-btn"
                class="w-full py-3 px-4 bg-primary hover:bg-indigo-600 text-white font-medium rounded-lg transition duration-200 transform hover:scale-[1.02] shadow-md hover:shadow-lg"
            >
                <i class="fas fa-sign-in-alt mr-2"></i>登录
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-gray-200">
            <div class="text-center text-sm text-gray-600">
                还没有账号？
                <a href="{% url 'web:register' %}" class="text-primary hover:text-indigo-600 hover:underline font-medium ml-1">
                    立即注册
            </a>
            </div>
        </div>
    </div>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        // 页面加载时获取验证码
        window.addEventListener('DOMContentLoaded', function() {
            refreshCaptcha();
        });

        // 刷新验证码
        async function refreshCaptcha() {
            try {
                const response = await fetch('/api/captcha/generate', {
                    method: 'GET',
                    credentials: 'same-origin'
                });
                
                const data = await response.json();
                
                if (data.success && data.data) {
                    document.getElementById('captcha-key').value = data.data.captcha_key;
                    document.getElementById('captcha-image').src = data.data.captcha_image_url;
                    document.getElementById('captcha').value = ''; // 清空验证码输入框
                } else {
                    showMessage('获取验证码失败，请刷新页面重试', 'error');
                }
            } catch (error) {
                console.error('获取验证码错误:', error);
                showMessage('获取验证码失败，请刷新页面重试', 'error');
            }
        }

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const btn = document.getElementById('login-btn');
            const messageContainer = document.getElementById('message-container');
            const messageContent = document.getElementById('message-content');
            
            // 获取表单数据
            const formData = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
                captcha: document.getElementById('captcha').value.trim(),
                captcha_key: document.getElementById('captcha-key').value
            };
            
            // 验证输入
            if (!formData.username || !formData.password) {
                showMessage('请填写用户名和密码', 'error');
                return;
            }
            
            if (!formData.captcha || !formData.captcha_key) {
                showMessage('请填写验证码', 'error');
                return;
            }
            
            // 先验证验证码
            try {
                const verifyResponse = await fetch('/api/captcha/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        captcha: formData.captcha,
                        captcha_key: formData.captcha_key
                    })
                });
                
                const verifyData = await verifyResponse.json();
                
                if (!verifyData.success) {
                    showMessage(verifyData.message || '验证码错误，请重新输入', 'error');
                    refreshCaptcha(); // 刷新验证码
                    return;
                }
            } catch (error) {
                console.error('验证码验证错误:', error);
                showMessage('验证码验证失败，请重试', 'error');
                refreshCaptcha(); // 刷新验证码
                return;
            }
            
            // 禁用按钮
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>登录中...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    credentials: 'same-origin',
                    body: JSON.stringify({
                        username: formData.username,
                        password: formData.password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage(data.message || '登录成功', 'success');
                    // 延迟跳转，让用户看到成功消息
                    setTimeout(() => {
                        window.location.href = '{% url "web:user_home" %}';
                    }, 500);
                } else {
                    showMessage(data.message || '登录失败', 'error');
                    refreshCaptcha(); // 刷新验证码
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>登录';
                }
            } catch (error) {
                console.error('登录错误:', error);
                showMessage('网络错误，请稍后重试', 'error');
                refreshCaptcha(); // 刷新验证码
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>登录';
        }
        });
        
        function showMessage(message, type) {
            const messageContainer = document.getElementById('message-container');
            const messageContent = document.getElementById('message-content');
            
            messageContainer.classList.remove('hidden');
            messageContent.className = 'p-4 rounded-lg mb-3';
            
            if (type === 'error') {
                messageContent.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');
                messageContent.innerHTML = '<div class="flex items-center"><i class="fas fa-exclamation-circle mr-2"></i>' + message + '</div>';
            } else if (type === 'success') {
                messageContent.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
                messageContent.innerHTML = '<div class="flex items-center"><i class="fas fa-check-circle mr-2"></i>' + message + '</div>';
            } else {
                messageContent.classList.add('bg-blue-50', 'text-blue-700', 'border', 'border-blue-200');
                messageContent.innerHTML = '<div class="flex items-center"><i class="fas fa-info-circle mr-2"></i>' + message + '</div>';
            }
        }
    </script>
</body>
</html>
