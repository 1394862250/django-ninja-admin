{% extends "user/base.html" %}

{% block title %}个人信息 - {{ user.username }}{% endblock %}

{% block page_title %}个人资料{% endblock %}

{% block content %}
<div class="p-6">
    <div class="mb-8">
        <h1 class="text-2xl font-bold text-gray-900 dark:text-white">个人信息</h1>
        <p class="mt-2 text-gray-600 dark:text-gray-400">查看和管理您的个人信息</p>
    </div>

    {% include "components/profile.html" %}
</div>
{% endblock %}

{% block scripts %}
<script>
    // 登出功能（用户资料页专用）
    document.addEventListener('DOMContentLoaded', function() {
        const logoutLink = document.getElementById('logout-link-profile');
        if (logoutLink) {
            logoutLink.addEventListener('click', async function(e) {
                e.preventDefault();
                
                if (!confirm('确定要退出登录吗？')) {
                    return;
                }
                
                try {
                    const response = await fetch('/api/auth/logout', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-CSRFToken': getCookie('csrftoken')
                        },
                        credentials: 'same-origin'
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        window.location.href = '{% url "web:login" %}';
                    } else {
                        alert(data.message || '登出失败');
                    }
                } catch (error) {
                    console.error('登出错误:', error);
                    window.location.href = '{% url "web:login" %}';
                }
            });
        }
    });
    
    // 获取Cookie的辅助函数
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>
{% endblock %}
